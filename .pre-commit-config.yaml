default_language_version:
  python: python3.12

repos:
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        types: [python]
        args: [ --preview ]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.3
    hooks:
      - id: ruff
        args: [ --fix ]
        types: [python]

  # isort for import sorting (synced with VS Code args)
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort

  # flake8 linting
  - repo: https://github.com/PyCQA/flake8
    rev: 7.1.0
    hooks:
      - id: flake8
        additional_dependencies:
          - flake8-bugbear        # catches common Python bugs
          - flake8-comprehensions # checks list/dict/set comprehensions
          - flake8-pyproject      # allow config in pyproject.toml

  # mypy type checker
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        additional_dependencies: [
          types-requests,   # example: add stubs for requests
          types-python-dateutil
        ]

  # Pre-commit hygiene hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files

  # Local pytest passes
  - repo: local
    hooks:
      - id: pytest-check
        always_run: true
        entry: pytest
        language: system
        name: pytest-check
        pass_filenames: false
        stages: [pre-commit]
        types: [python]
